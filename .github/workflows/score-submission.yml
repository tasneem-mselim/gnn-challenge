name: Score Submission

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    paths:
      - 'submissions/inbox/**'
  push:
    branches:
      - main
    paths:
      - 'submissions/inbox/**/predictions.csv.enc'
      - 'submissions/inbox/**/metadata.json'
  workflow_dispatch:

jobs:
  score:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code (base branch only)
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn torch torch-geometric

      - name: Restore private test labels
        env:
          TEST_LABELS_CSV_B64: ${{ secrets.TEST_LABELS_CSV_B64 }}
        run: |
          if [ -z "$TEST_LABELS_CSV_B64" ]; then
            echo "Missing TEST_LABELS_CSV_B64 secret"
            exit 1
          fi
          mkdir -p data
          echo "$TEST_LABELS_CSV_B64" | base64 -d > data/test_labels.csv

      - name: Find submission file (from PR)
        id: find_submission
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("No pull request context available.");
              return;
            }
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              }
            );

            const activeSubmissionFiles = files.filter(f =>
              f.filename.startsWith("submissions/inbox/") &&
              f.status !== "removed"
            );

            const predictionCandidates = activeSubmissionFiles.filter(f => f.filename.endsWith("/predictions.csv.enc"));
            const plaintextCandidates = activeSubmissionFiles.filter(f => f.filename.endsWith("/predictions.csv"));
            const metadataCandidates = activeSubmissionFiles.filter(f => f.filename.endsWith("/metadata.json"));

            if (plaintextCandidates.length > 0) {
              core.setFailed("Plaintext predictions.csv is not allowed. Submit encrypted predictions.csv.enc only.");
              return;
            }

            if (predictionCandidates.length !== 1 || metadataCandidates.length !== 1) {
              core.setFailed("PR must include exactly one active predictions.csv.enc and one active metadata.json under submissions/inbox/<team>/<run_id>/.");
              return;
            }

            const predictionFile = predictionCandidates[0].filename;
            const metadataFile = metadataCandidates[0].filename;

            const predParts = predictionFile.split("/");
            const metaParts = metadataFile.split("/");
            const predKey = predParts.slice(0, 4).join("/");
            const metaKey = metaParts.slice(0, 4).join("/");
            if (predKey !== metaKey) {
              core.setFailed("predictions.csv.enc and metadata.json must be in the same submissions/inbox/<team>/<run_id>/ folder.");
              return;
            }

            const parts = predictionFile.split("/");
            if (parts.length < 5) {
              core.setFailed("Invalid submission path. Expected submissions/inbox/<team>/<run_id>/predictions.csv.enc");
              return;
            }

            core.setOutput("prediction", predictionFile);
            core.setOutput("metadata", metadataFile);
            core.setOutput("head_repo", pr.head.repo.full_name);
            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("submitter", pr.user.login);
            core.setOutput("pr_number", pr.number);
            core.setOutput("team", parts[2]);
            core.setOutput("run_id", parts[3]);

      - name: Download submission files (read-only)
        id: download_submission
        env:
          PRED_PATH: ${{ steps.find_submission.outputs.prediction }}
          META_PATH: ${{ steps.find_submission.outputs.metadata }}
          HEAD_REPO: ${{ steps.find_submission.outputs.head_repo }}
          HEAD_SHA: ${{ steps.find_submission.outputs.head_sha }}
        run: |
          if [ -z "$PRED_PATH" ] || [ -z "$META_PATH" ] || [ -z "$HEAD_REPO" ] || [ -z "$HEAD_SHA" ]; then
            echo "Missing PR submission metadata"
            exit 1
          fi
          case "$PRED_PATH" in
            submissions/inbox/*/*/predictions.csv.enc) ;;
            *) echo "Invalid submission path: $PRED_PATH"; exit 1 ;;
          esac
          case "$META_PATH" in
            submissions/inbox/*/*/metadata.json) ;;
            *) echo "Invalid metadata path: $META_PATH"; exit 1 ;;
          esac
          PRED_URL="https://raw.githubusercontent.com/${HEAD_REPO}/${HEAD_SHA}/${PRED_PATH}"
          META_URL="https://raw.githubusercontent.com/${HEAD_REPO}/${HEAD_SHA}/${META_PATH}"
          curl -fsSL "$PRED_URL" -o /tmp/pr_predictions.csv.enc
          curl -fsSL "$META_URL" -o /tmp/pr_metadata.json

      - name: Import submission private key
        env:
          SUBMISSION_PRIVATE_KEY_ASC: ${{ secrets.SUBMISSION_PRIVATE_KEY_ASC }}
        run: |
          if ! command -v gpg >/dev/null 2>&1; then
            echo "gpg is required but not installed on runner"
            exit 1
          fi
          if [ -z "$SUBMISSION_PRIVATE_KEY_ASC" ]; then
            echo "Missing SUBMISSION_PRIVATE_KEY_ASC secret"
            exit 1
          fi
          export GNUPGHOME=/tmp/gnupg_submission
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          echo "$SUBMISSION_PRIVATE_KEY_ASC" | gpg --batch --import

      - name: Verify keypair consistency for refresh
        run: |
          export GNUPGHOME=/tmp/gnupg_submission
          secret_fpr="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          public_fpr="$(gpg --show-keys --with-colons .github/keys/submission_public.asc | awk -F: '/^fpr:/ {print $10; exit}')"
          if [ -z "$secret_fpr" ] || [ -z "$public_fpr" ]; then
            echo "Unable to determine key fingerprints for refresh"
            exit 1
          fi
          echo "Refresh secret key fingerprint: $secret_fpr"
          echo "Repo public key fingerprint:   $public_fpr"
          if [ "$secret_fpr" != "$public_fpr" ]; then
            echo "❌ Secret private key does not match .github/keys/submission_public.asc"
            exit 1
          fi

      - name: Decrypt submission predictions
        env:
          SUBMISSION_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SUBMISSION_PRIVATE_KEY_PASSPHRASE }}
        run: |
          export GNUPGHOME=/tmp/gnupg_submission
          if [ -n "$SUBMISSION_PRIVATE_KEY_PASSPHRASE" ]; then
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$SUBMISSION_PRIVATE_KEY_PASSPHRASE" \
              --decrypt /tmp/pr_predictions.csv.enc > /tmp/pr_predictions.csv
          else
            gpg --batch --yes --decrypt /tmp/pr_predictions.csv.enc > /tmp/pr_predictions.csv
          fi

      - name: Enforce one submission attempt per participant
        env:
          SUBMITTER: ${{ steps.find_submission.outputs.submitter }}
        run: |
          python - <<'PY'
          import csv
          import json
          import os
          import sys
          from pathlib import Path

          submitter = os.environ.get("SUBMITTER", "").strip().lower()
          if not submitter:
              print("❌ Missing submitter identity for policy enforcement.")
              sys.exit(1)

          leaderboard_csv = Path("leaderboard/leaderboard.csv")
          if not leaderboard_csv.exists():
              print("ℹ️ leaderboard/leaderboard.csv not found yet; skipping one-attempt check.")
              sys.exit(0)

          prior_submitters = set()
          with leaderboard_csv.open(newline="", encoding="utf-8") as f:
              reader = csv.DictReader(f)
              if reader.fieldnames and "submitter" in reader.fieldnames:
                  prior_submitters.update(
                      (row.get("submitter") or "").strip().lower()
                      for row in reader
                      if (row.get("submitter") or "").strip()
                  )
              else:
                  print("ℹ️ 'submitter' column missing in leaderboard CSV; using metadata fallback scan.")

          # Fallback/defense-in-depth: scan existing metadata files for submitter logins.
          for meta_path in Path("submissions/inbox").glob("*/*/metadata.json"):
              try:
                  data = json.loads(meta_path.read_text(encoding="utf-8"))
              except Exception:
                  continue
              s = (data.get("submitter") or "").strip().lower()
              if s:
                  prior_submitters.add(s)

          if submitter in prior_submitters:
              print(f"❌ Submission rejected: '{submitter}' has already submitted once. Only one attempt per participant is allowed.")
              sys.exit(1)

          print(f"✅ One-attempt policy check passed for '{submitter}'.")
          PY

      - name: Validate submission format
        run: |
          python competition/validate_submission.py /tmp/pr_predictions.csv

      - name: Run scoring script
        id: score
        run: |
          python scoring_script.py /tmp/pr_predictions.csv
        continue-on-error: true

      - name: Extract metrics and comment
        if: steps.score.outcome == 'success'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const submissionFile = "/tmp/pr_predictions.csv";
            const metrics = require('child_process').execSync(
              `python scoring_script.py ${submissionFile}`,
              { encoding: 'utf-8' }
            );
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🏆 Submission Scored\n\n\`\`\`\n${metrics}\n\`\`\`\n\nCheck the [leaderboard](https://github.com/${{ github.repository }}/blob/main/leaderboard.md) for rankings!`
            });

      - name: Cleanup private labels
        if: always()
        run: |
          rm -f data/test_labels.csv
          rm -f /tmp/pr_predictions.csv /tmp/pr_predictions.csv.enc /tmp/pr_metadata.json
          rm -rf /tmp/gnupg_submission

  refresh_leaderboard_on_main:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn torch torch-geometric

      - name: Restore private test labels
        env:
          TEST_LABELS_CSV_B64: ${{ secrets.TEST_LABELS_CSV_B64 }}
        run: |
          if [ -z "$TEST_LABELS_CSV_B64" ]; then
            echo "Missing TEST_LABELS_CSV_B64 secret"
            exit 1
          fi
          mkdir -p data
          echo "$TEST_LABELS_CSV_B64" | base64 -d > data/test_labels.csv

      - name: Import submission private key
        env:
          SUBMISSION_PRIVATE_KEY_ASC: ${{ secrets.SUBMISSION_PRIVATE_KEY_ASC }}
        run: |
          if ! command -v gpg >/dev/null 2>&1; then
            echo "gpg is required but not installed on runner"
            exit 1
          fi
          if [ -z "$SUBMISSION_PRIVATE_KEY_ASC" ]; then
            echo "Missing SUBMISSION_PRIVATE_KEY_ASC secret"
            exit 1
          fi
          export GNUPGHOME=/tmp/gnupg_submission
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          echo "$SUBMISSION_PRIVATE_KEY_ASC" | gpg --batch --import

      - name: Regenerate leaderboard artifacts
        env:
          SUBMISSION_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SUBMISSION_PRIVATE_KEY_PASSPHRASE }}
          GNUPGHOME: /tmp/gnupg_submission
        run: |
          python update_leaderboard.py
          python competition/render_leaderboard.py

      - name: Commit leaderboard artifacts
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add leaderboard/leaderboard.csv docs/leaderboard.csv leaderboard.md
          git commit -m "Refresh leaderboard artifacts" || exit 0
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "Push attempt $i failed due to concurrent updates. Retrying..."
            sleep 2
          done
          echo "❌ Failed to push leaderboard artifacts after 3 attempts."
          exit 1

      - name: Cleanup private labels
        if: always()
        run: |
          rm -f data/test_labels.csv
          rm -rf /tmp/gnupg_submission

          
